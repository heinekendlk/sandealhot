name: Update Products from Google Sheets

on:
  schedule:
    - cron: '0 * * * *' # Chạy tự động mỗi giờ một lần
  workflow_dispatch: # Cho phép nhấn nút chạy thủ công trên GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Run sync script
        run: node sync_sheets.js

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add products.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update products.json from google sheets [skip ci]"
            git push
          fi
